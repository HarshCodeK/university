{% extends 'base.html' %}
{% block title %}{{ action }} Employee{% endblock %}
{% block content %}
<h3>{{ action }} Employee</h3>
<div class="row">
    <div class="col-md-6">
        <form method="post" class="mt-3">
            {% csrf_token %}
            <div class="mb-2"><label>Username</label><input type="text" name="username" class="form-control" value="{{ emp.user.username }}" {% if action == 'Edit' %}readonly{% endif %} required></div>
            {% if action == 'Add' %}<div class="mb-2"><label>Password</label><input type="password" name="password" class="form-control" required></div>{% endif %}
            <div class="mb-2"><label>First Name</label><input type="text" name="first_name" class="form-control" value="{{ emp.user.first_name }}" required></div>
            <div class="mb-2"><label>Last Name</label><input type="text" name="last_name" class="form-control" value="{{ emp.user.last_name }}" required></div>
            <div class="mb-2"><label>Employee ID</label><input type="text" name="employee_id" class="form-control" value="{{ emp.employee_id }}" {% if action == 'Edit' %}readonly{% endif %} required></div>
            <div class="mb-2"><label>Phone</label><input type="text" name="phone" class="form-control" value="{{ emp.phone }}" required></div>
            <div class="mb-2"><label>Department</label><input type="text" name="department" class="form-control" value="{{ emp.department }}" required></div>
            <div class="mb-2"><label>Role</label>
                <select name="role" class="form-control">
                    <option value="EMP" {% if emp.role == 'EMP' %}selected{% endif %}>Employee</option>
                    <option value="HR" {% if emp.role == 'HR' %}selected{% endif %}>HR Manager</option>
                </select>
            </div>
            <div class="mb-2"><label>Hourly Rate (₹)</label><input type="number" step="0.01" name="hourly_rate" class="form-control" value="{{ emp.hourly_rate }}" required></div>
            <button type="submit" class="btn btn-success mt-2">Save</button>
            <a href="{% url 'employee_list' %}" class="btn btn-secondary mt-2">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
